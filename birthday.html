<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Aami ❤️</title>
<style>
    body {
        margin: 0;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: 'Arial', sans-serif;
        text-align: center;
        overflow-x: hidden;
    }
    h1 {
        margin-top: 50px;
        font-size: 2.5em;
        color: white;
        text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    p {
        color: white;
        font-size: 1.2em;
        margin-top: 10px;
    }
    button {
        margin-top: 30px;
        padding: 12px 25px;
        font-size: 1.1em;
        background: white;
        color: #ff4f81;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }
    button:hover {
        background: #ffe1ec;
    }
    .message {
        display: none;
        margin-top: 30px;
        font-size: 1.3em;
        color: white;
        padding: 10px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
    }
    /* Falling hearts animation */
    .heart {
        position: fixed;
        top: -10px;
        color: #ff4f81;
        font-size: 24px;
        animation: fall linear forwards;
    }
    @keyframes fall {
        to {
            transform: translateY(100vh);
            opacity: 0;
        }
    }
</style>
</head>
<body>

<h1>🎉 Happy Birthday, Aami! 🎂</h1>
<p>You make my world brighter every day ❤️</p>

<button onclick="showMessage()">Click for a Surprise 🎁</button>

<div class="message" id="specialMessage">
    💖 Dear Aami, you are the most special person in my life.  
    I’m so lucky to have you, and I love you endlessly. 💖
</div>

<script>
// Show message
function showMessage() {
    document.getElementById("specialMessage").style.display = "block";
}

// Create falling hearts
function createHeart() {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
